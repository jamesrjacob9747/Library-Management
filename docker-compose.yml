services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: library_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:-library_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # remove this line in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-library_management}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - library_net

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-library_management}
      API_KEY: ${API_KEY:?API_KEY is required}
      FRONTEND_URL: http://localhost:5173
    ports:
      - "3001:3001"          # remove this line in production (nginx proxies internally)
    networks:
      - library_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Frontend (nginx) ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_KEY: ${API_KEY:?API_KEY is required}
        VITE_API_BASE_URL: /api   # nginx proxies /api → backend:3001/api
    container_name: library_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    networks:
      - library_net

  # ── Prisma Migrate (runs once, creates/updates schema) ────────────────────────
  prisma-migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_prisma_migrate
    command: npx prisma db push --accept-data-loss
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-library_management}
    networks:
      - library_net
    profiles:
      - migrate              # only runs with: docker compose --profile migrate up prisma-migrate

  # ── DB Seeder (runs once, then exits) ─────────────────────────────────────────
  seeder:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_seeder
    command: node src/seeds/run.js
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-library_management}
      API_KEY: ${API_KEY:?API_KEY is required}
    networks:
      - library_net
    profiles:
      - seed                 # only runs with: docker compose --profile seed up seeder

volumes:
  postgres_data:

networks:
  library_net:
    driver: bridge